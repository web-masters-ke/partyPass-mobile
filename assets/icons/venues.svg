  <path d="M32 4 C20 4 11 13 11 24 C11 38 32 60 32 60 C32 60 53 38 53 24 C53 13 44 4 32 4 Z" fill="#4527A0"/>
  <!-- pin inner circle -->
  <circle cx="32" cy="24" r="13" fill="#7E57C2"/>
  <circle cx="32" cy="24" r="10" fill="#311B92"/>
  <!-- music note inside pin -->
  <!-- note head -->
  <ellipse cx="30" cy="29" rx="4" ry="3" fill="white" opacity="0.9" transform="rotate(-15 30 29)"/>
  <!-- note stem -->
  <rect x="33.5" y="18" width="2.5" height="12" rx="1.25" fill="white" opacity="0.9"/>
  <!-- note flag -->
